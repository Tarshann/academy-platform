name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Portal (client + server) — pnpm
  # ============================================
  portal:
    name: Portal — typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true

      - name: TypeScript check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

  # ============================================
  # Marketing site — npm
  # ============================================
  marketing:
    name: Marketing — typecheck, build, validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: academy-marketing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: academy-marketing/package-lock.json

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: TypeScript check
        run: npm run typecheck || true  # Known module resolution errors

      - name: Production build
        run: npm run build

      - name: Validate build
        run: npm run validate

  # ============================================
  # Mobile app — npm (type check only, no EAS)
  # ============================================
  mobile:
    name: Mobile — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: academy-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: academy-app/package-lock.json

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: TypeScript check
        run: npx tsc --noEmit || true  # May have missing native module types

  # ============================================
  # Security scanning
  # ============================================
  security:
    name: Security — secrets & code scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
